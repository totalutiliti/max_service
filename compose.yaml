name: max-service

services:
  database:
    image: postgres:16-alpine
    container_name: max-service-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: max_service
      POSTGRES_USER: max_service_admin
      POSTGRES_PASSWORD: max_service_admin_local
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - max-service-postgres:/var/lib/postgresql/data
      - ./api/docker/init-db.sql:/docker-entrypoint-initdb.d/001-init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U max_service_admin -d max_service"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: max-service-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DEMO_MODE: "true"
      CORS_ORIGIN: http://127.0.0.1:4174
      DATABASE_URL: postgresql://max_service_app:max_service_runtime_local@database:5432/max_service
      MIGRATION_DATABASE_URL: postgresql://max_service_admin:max_service_admin_local@database:5432/max_service
      BFF_INTERNAL_SECRET: max-service-bff-local-only
      FINANCIAL_SANDBOX_SECRET: max-service-sandbox-local-only
      OBJECT_STORAGE_ENDPOINT: http://storage:9000
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_BUCKET: max-service-private
      OBJECT_STORAGE_ACCESS_KEY: max_service_local
      OBJECT_STORAGE_SECRET_KEY: max_service_objects_local
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    depends_on:
      database:
        condition: service_healthy
      storage:
        condition: service_started
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: max-service-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: max_service_local
      MINIO_ROOT_PASSWORD: max_service_objects_local
    ports:
      - "127.0.0.1:59000:9000"
      - "127.0.0.1:59001:9001"
    volumes:
      - max-service-objects:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: max-service-web
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:3001
      BFF_INTERNAL_SECRET: max-service-bff-local-only
      COOKIE_SECURE: "false"
      FINANCIAL_SANDBOX_SECRET: max-service-sandbox-local-only
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:4174:4174"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4174/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  max-service-postgres:
  max-service-objects:
